# TapLife backend — deploy on https://render.com
# 1. Push this repo to GitHub
# 2. Render Dashboard → New → Blueprint → connect repo
# 3. Set DATABASE_URL (Neon) and JWT_SECRET when prompted
# 4. Copy the service URL into frontend/.env and firmware CLOUD_API_HOST

services:
  - type: web
    name: taplife-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
